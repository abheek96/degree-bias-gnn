dataset:
  name: Chameleon
  use_cc: false         # Chameleon is a single connected component
  normalize_features: l1

model:
  name: GCN
  hidden_dim: 32
  num_layers: 6
  dropout: 0.0

train:
  lr: 0.01
  weight_decay: 0.0
  epochs: 500
  patience: 20

plot:
  layer_values: [1, 2, 3, 4]
  compare_models: [GCN]
