seed: 42
num_runs: 10
device: 'cuda'

results_dir: ./results
split: 'random'        # random, public, or custom

dataset:
  name: Cora
  root: ./data
  use_cc: true
  num_train_per_class: 20
  num_val: 500
  num_test: 1000

model:
  name: GCN
  hidden_dim: 512
  num_layers: 2
  dropout: 0.0

train:
  lr: 0.001
  weight_decay: 5e-4
  epochs: 1000      # safety cap; loop stops early when train acc = 100%
  patience: 200        # disabled — stopping criterion is train accuracy, not val

plot:
  acc_vs_degree: true
  neighborhood_cardinality: true
  acc_vs_distance: true
  acc_vs_degree_by_layers: false
  layer_values: [1, 2, 3, 4, 5]
  model_layer_values: {}
  model_hyperparams: {}
  compare_models: []
  spl_vs_degree: true
  labelling_ratio: true
  purity_vs_degree: true
  purity_k_max: 2
  class_accuracy: true
  influence_analysis: true
  influence_degrees: [44]        # exact degree values to investigate, e.g. [3, 5, 10]
  influence_nodes: []            # explicit node indices to investigate, e.g. [1362, 42]
  similarity_nodes: []          # node indices for per-node layer-wise similarity analysis, e.g. [1858, 1930]
  feature_similarity: false      # cosine sim to same-class train neighbors: raw vs h^(k), delta per degree
  influence_disparity: true     # disparity for ALL test nodes (expensive: one Jacobian per node)
  train_neighbor_degree: true  # degree distribution of same vs diff training neighbors
  save: true
  show: false
