seed: 42
num_runs: 5

dataset:
  name: Cora          # Cora, CiteSeer, PubMed, etc.
  root: ./data

model:
  name: GCN           # GCN, GAT, GraphSAGE
  hidden_dim: 64
  num_layers: 2
  dropout: 0.5

train:
  lr: 0.01
  weight_decay: 5e-4
  epochs: 200
  patience: 20        # early stopping patience (0 to disable)
