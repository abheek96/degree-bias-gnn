seed: 42
num_runs: 5
device: 'cuda'

results_dir: ./results
split: random        # random, public, or custom

plot:
  acc_vs_degree: true
  acc_vs_distance: true
  acc_vs_khop_degree: true
  khop_k: 2          # neighbourhood radius for k-hop degree
  acc_vs_degree_by_layers: true
  layer_values: [1, 2, 3, 4, 5]
  save: true
  show: false

dataset:
  name: Cora          # Cora, CiteSeer, PubMed, etc.
  root: ./data
  use_cc: true          # whether to use the largest connected component
  num_train_per_class: 20
  num_val: 500
  num_test: 1000
  

model:
  name: GCN           # GCN, GAT, GraphSAGE
  hidden_dim: 512
  num_layers: 2
  dropout: 0.0

train:
  lr: 0.001
  weight_decay: 5e-4
  epochs: 200
  patience: 0      # early stopping patience (0 to disable)
