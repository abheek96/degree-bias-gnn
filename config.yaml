seed: 42
num_runs: 5
device: 'cuda'

results_dir: ./results
split: random        # random, public, or custom

dataset:
  name: Cora
  root: ./data
  use_cc: true
  num_train_per_class: 20
  num_val: 500
  num_test: 1000

model:
  name: GCN
  hidden_dim: 512
  num_layers: 2
  dropout: 0.0

train:
  lr: 0.001
  weight_decay: 5e-4
  epochs: 200
  patience: 50

plot:
  acc_vs_degree: true
  acc_vs_distance: true
  acc_vs_khop_degree: true
  khop_k: 2
  acc_vs_degree_by_layers: false
  layer_values: [1, 2, 3, 4, 5]
  model_layer_values: {}
  model_hyperparams: {}
  compare_models: []
  spl_vs_degree: true
  labelling_ratio: true
  purity_vs_degree: true
  purity_k_max: 2
  influence_analysis: true
  influence_degrees: []        # exact degree values to investigate, e.g. [3, 5, 10]
  save: true
  show: false
