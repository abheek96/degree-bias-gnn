seed: 42
num_runs: 10
device: 'cuda'

results_dir: ./results
split: 'public'        # random, public, or custom

dataset:
  name: Cora
  root: ./data
  use_cc: true
  num_train_per_class: 20
  num_val: 500
  num_test: 1000
  fix_test_to_public: false   # random split only: keep public-split test nodes, randomise train/val

model:
  name: GCN
  hidden_dim: 64
  num_layers: 3
  dropout: 0.8

train:
  lr: 0.01
  weight_decay: 1e-3
  epochs: 500      # safety cap; loop stops early when train acc = 100%
  patience: 50        # disabled — stopping criterion is train accuracy, not val

plot:
  acc_vs_degree: true
  neighborhood_cardinality: true
  acc_vs_distance: true
  acc_vs_degree_by_layers: false
  layer_values: [1, 2, 3, 4, 5]
  model_layer_values: {}
  model_hyperparams: {}
  compare_models: []
  spl_vs_degree: true
  labelling_ratio: true
  purity_vs_degree: true
  purity_k_max: 2
  purity_delta: false            # mean purity delta (k_max - k_min) per degree; rarely needed
  class_accuracy: false          # class-wise degree + accuracy plots; generate once, then disable
  train_degree_distribution: false  # histogram of training-node degrees; generate once, then disable
  influence_analysis: false
  centrality_vs_degree: true
  centrality_vs_accuracy: true
  influence_degrees: []          # exact degree values to investigate, e.g. [3, 5, 10]
  similarity_nodes: []           # node indices for per-node layer-wise similarity analysis
  inspect_nodes: []              # node indices to inspect aggregation neighbourhood
  feature_similarity: false      # cosine sim to same-class train neighbours: raw vs h^(k), delta per degree
  influence_disparity: false     # disparity for ALL test nodes (expensive: one Jacobian per node)
  train_neighbor_degree: false   # degree distribution of same vs diff training neighbours
  train_1hop_deg_accuracy: false # 1-hop training-neighbour degree boxplots + accuracy overlay
  max_same_train_deg: false      # boxplots of max same-class training-neighbour degree per degree group
  save: true
  show: false
